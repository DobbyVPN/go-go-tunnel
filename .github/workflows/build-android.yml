name: Build Android

on:
  push:
    branches: ["*"]
  pull_request:
  workflow_dispatch:

env:
  CONAN_VER: 2.12
  LLVM_MAJOR_VER: 21
  BUILD_DIR: build
  ANDROID_NDK_VERSION: 28.1.13356709
  ANDROID_ABI: arm64-v8a
  ANDROID_PLATFORM: android-26

jobs:
  android-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

          pip install -r TrustTunnelClient/requirements.txt
          pip install conan~=$CONAN_VER

          # Install LLVM/Clang (needed for host tools during cross-compilation)
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_MAJOR_VER
          rm ./llvm.sh
          sudo apt-get install -y libc++-${LLVM_MAJOR_VER}-dev libclang-rt-${LLVM_MAJOR_VER}-dev
          echo "/usr/lib/llvm-$LLVM_MAJOR_VER/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install cargo-ndk
        run: cargo install cargo-ndk || true

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: android-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}
          restore-keys: android-conan2-

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        working-directory: TrustTunnelClient
        run: ./scripts/bootstrap_conan_deps.py

      - name: Prepare dobby_bridge build
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> TrustTunnelClient/CMakeLists.txt

      - name: CMake configure (Android cross-compile)
        working-directory: TrustTunnelClient
        run: |
          mkdir -p $BUILD_DIR && cd $BUILD_DIR && \
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DANDROID_STL=c++_static \
            -DIPV6_UNAVAILABLE=ON \
            -GNinja \
            ..

      - name: Save conan cache
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: android-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}

      - name: Build dobby_bridge
        working-directory: TrustTunnelClient
        run: cmake --build $BUILD_DIR --target dobby_bridge

      - name: Prepare library directory
        run: |
          mkdir -p lib/android/${{ env.ANDROID_ABI }}
          cp TrustTunnelClient/$BUILD_DIR/dobby_bridge/libdobby_bridge.so lib/android/${{ env.ANDROID_ABI }}/
          echo "=== Library info ==="
          file lib/android/${{ env.ANDROID_ABI }}/libdobby_bridge.so
          ls -lh lib/android/${{ env.ANDROID_ABI }}/libdobby_bridge.so
          echo "=== Exported symbols ==="
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm -D \
            lib/android/${{ env.ANDROID_ABI }}/libdobby_bridge.so | grep -i "dobby" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdobby_bridge-android-${{ env.ANDROID_ABI }}
          path: lib/android/${{ env.ANDROID_ABI }}/libdobby_bridge.so
