      - name: Bundle All Dependencies into Single Archive
        working-directory: TrustTunnelClient/build
        shell: bash
        run: |
          echo "Finding all required static libraries..."
          
          # Save the build directory
          BUILD_DIR="$(pwd)"
          
          # Create temporary directory for extraction
          TEMP_DIR=$(mktemp -d)
          EXTRACT_DIR="$TEMP_DIR/extracted"
          mkdir -p "$EXTRACT_DIR"
          
          # Extract dobby_bridge
          echo "   Extracting dobby_bridge..."
          mkdir -p "$EXTRACT_DIR/dobby_bridge"
          cd "$EXTRACT_DIR/dobby_bridge"
          ar x "$BUILD_DIR/dobby_bridge/libdobby_bridge.a" || echo "Warning: Some members couldn't be extracted"
          
