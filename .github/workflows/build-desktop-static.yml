  build-static-windows:
    runs-on: windows-latest
    env:
      MSVC_VER: 17
      MSVC_YEAR: 2022
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dependencies
        run: |
          choco install strawberryperl nasm
          pip install conan~=${{ env.CONAN_VER }} ninja

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          (Get-Content conanfile.py) -replace 'dns-libs/2.8.51@', 'dns-libs/2.8.52@' | Set-Content conanfile.py
          Write-Host "Patched conanfile.py to use dns-libs 2.8.52"
          Select-String -Path conanfile.py -Pattern "dns-libs"

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: |
          python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          Add-Content -Path CMakeLists.txt -Value 'add_subdirectory("../dobby_bridge" "dobby_bridge")'

      - name: Configure and Build Static Library (MSVC)
        working-directory: TrustTunnelClient
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="cl.exe" `
            -DCMAKE_CXX_COMPILER="cl.exe" `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON `
            -DBUILD_STATIC_LIBS=ON `
            -G "Ninja" `
            ..
          cmake --build . --target dobby_bridge

      - name: Bundle All Dependencies into Single Archive (Windows)
        working-directory: TrustTunnelClient/build
        run: |
          Write-Host "=== Finding all required static libraries ==="
          
          # Create a response file to avoid command line length limits
          $responseFile = "libs_list.txt"
          if (Test-Path $responseFile) { Remove-Item $responseFile }
          
          Write-Host ""
          Write-Host "Searching for all .lib files..."
          
          # Find all .lib files, excluding system libraries
          $libCount = 0
          Get-ChildItem -Recurse -Filter "*.lib" | Where-Object {
            $_.Name -notmatch "^(ucrt|vcruntime|msvcrt|libcmt|oldnames)" -and
            $_.DirectoryName -notmatch "Windows\\Kits" -and
            $_.DirectoryName -notmatch "Microsoft Visual Studio"
          } | ForEach-Object {
            Write-Host "   Found: $($_.Name) in $($_.DirectoryName)"
            Add-Content -Path $responseFile -Value "`"$($_.FullName)`""
            $libCount++
          }
          
          Write-Host ""
          Write-Host "Total libraries found: $libCount"
          
          # Check if we found any libraries
          if (-not (Test-Path $responseFile) -or (Get-Content $responseFile).Length -eq 0) {
            Write-Host "ERROR: No libraries found!"
            exit 1
          }
          
          # Combine all libraries using response file
          Write-Host ""
          Write-Host "=== Creating bundled library ==="
          lib.exe /OUT:dobby_bridge\dobby_bridge.lib /VERBOSE "@$responseFile"
          
          # Cleanup response file
          Remove-Item $responseFile
          
          Write-Host ""
          Write-Host "=== Bundled library created successfully ==="
          dir dobby_bridge\dobby_bridge.lib

      - name: Verify Bundled Static Library
        working-directory: TrustTunnelClient/build/dobby_bridge
        run: |
          dir dobby_bridge.lib
          lib /LIST dobby_bridge.lib > lib_contents.txt
          powershell -Command "Get-Content lib_contents.txt | Measure-Object -Line | Select-Object -ExpandProperty Lines"
          
      - name: Upload Windows Static Library
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-windows-static
          path: TrustTunnelClient/build/dobby_bridge/dobby_bridge.lib

  commit-libraries:
    needs: [build-static-macos, build-static-linux, build-static-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download macOS Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-macos-static
          path: lib/macos

      - name: Download Linux Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-linux-static
          path: lib/linux

      - name: Download Windows Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-windows-static
          path: lib/windows

      - name: Verify Libraries
        run: |
          echo "=== macOS ==="
          ls -lh lib/macos/
          file lib/macos/libdobby_bridge.a
          echo ""
          echo "=== Linux ==="
          ls -lh lib/linux/
          file lib/linux/libdobby_bridge.a
          echo ""
          echo "=== Windows ==="
          ls -lh lib/windows/
          file lib/windows/dobby_bridge.lib

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Commit and Push Static Libraries
        run: |
          git add lib/macos/libdobby_bridge.a
          git add lib/linux/libdobby_bridge.a
          git add lib/windows/dobby_bridge.lib
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update static libraries [skip ci]"
            git push
          fi
