name: Build Desktop Static Libraries

env:
  CONAN_VER: 2.12

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'dobby_bridge/**'
      - 'TrustTunnelClient/**'
      - '.github/workflows/build-desktop-static.yml'
  release:
    types: [created]

jobs:
  build-static-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install LLVM and Dependencies
        run: |
          brew install ninja llvm@21
          sed -i '' 's/_LIBCPP_INTRODUCED_IN_LLVM_21 1/_LIBCPP_INTRODUCED_IN_LLVM_21 0/g' "$(brew --prefix llvm@21)/include/c++/v1/__configuration/availability.h"
          pip install conan~=$CONAN_VER
          echo "/opt/homebrew/opt/llvm@21/bin" >> $GITHUB_PATH

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i '' 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Static Library
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_STATIC_LIBS=ON \
            -G "Ninja" ..
          cmake --build . --target dobby_bridge
          
          # List all .a files to see where Conan puts them
          echo "=== Listing all .a files in build directory ==="
          find . -name "*.a" -type f | head -50

      - name: Bundle All Dependencies into Single Archive
        working-directory: TrustTunnelClient/build
        shell: bash
        run: |
          echo "=== Finding all required static libraries ==="
          
          # Save the build directory
          BUILD_DIR="$(pwd)"
          
          # Find Conan cache directory
          CONAN_CACHE="$HOME/.conan2"
          
          # Create temporary directory for extraction
          TEMP_DIR=$(mktemp -d)
          EXTRACT_DIR="$TEMP_DIR/extracted"
          mkdir -p "$EXTRACT_DIR"
          
          echo "Build directory: $BUILD_DIR"
          echo "Conan cache: $CONAN_CACHE"
          echo "Extract directory: $EXTRACT_DIR"
          echo ""
          
          # Extract dobby_bridge
          echo "1. Extracting dobby_bridge..."
          mkdir -p "$EXTRACT_DIR/dobby_bridge"
          cd "$EXTRACT_DIR/dobby_bridge"
          ar x "$BUILD_DIR/dobby_bridge/libdobby_bridge.a" 2>&1 || echo "Warning: Some members couldn't be extracted"
          OBJ_COUNT=$(find . -name "*.o" | wc -l)
          echo "   -> $OBJ_COUNT object files"
          
          # Find and extract TrustTunnel core libraries
          echo ""
          echo "2. Extracting vpnlibs..."
          cd "$BUILD_DIR"
          VPNLIBS=$(find . -name "libvpnlibs_*.a" 2>/dev/null || true)
          
          for lib in $VPNLIBS; do
            lib_abs="$BUILD_DIR/$lib"
            libname=$(basename "$lib" .a)
            echo "   Extracting $libname..."
            mkdir -p "$EXTRACT_DIR/$libname"
            cd "$EXTRACT_DIR/$libname"
            if ar t "$lib_abs" >/dev/null 2>&1; then
              ar x "$lib_abs" 2>/dev/null || echo "   Warning: Partial extraction for $libname"
              OBJ_COUNT=$(find . -name "*.o" | wc -l)
              echo "   -> $OBJ_COUNT object files"
            fi
          done
          
          # Extract ALL .a files from build directory
          echo ""
          echo "3. Searching for libraries in build directory..."
          cd "$BUILD_DIR"
          
          ALL_LIBS=$(find . -type f -name "*.a" 2>/dev/null | \
            grep -v "libdobby_bridge.a" | \
            grep -v "libvpnlibs_" | \
            grep -v "cmake" || true)
          
          LIB_COUNT=$(echo "$ALL_LIBS" | grep -c "\.a$" || echo 0)
          echo "   Found $LIB_COUNT libraries in build directory"
          
          for lib in $ALL_LIBS; do
            lib_abs="$BUILD_DIR/$lib"
            libname=$(basename "$lib" .a | sed 's/^lib//')
            
            echo "   Extracting $libname from $lib..."
            mkdir -p "$EXTRACT_DIR/$libname"
            cd "$EXTRACT_DIR/$libname"
            if ar t "$lib_abs" >/dev/null 2>&1; then
              ar x "$lib_abs" 2>/dev/null || echo "   Warning: Partial extraction for $libname"
              OBJ_COUNT=$(find . -name "*.o" | wc -l)
              if [ $OBJ_COUNT -gt 0 ]; then
                echo "   -> $OBJ_COUNT object files"
              fi
            fi
          done
          
          # Also search in Conan cache - INCLUDE ALL CRITICAL DEPENDENCIES
          echo ""
          echo "4. Searching for libraries in Conan cache..."
          if [ -d "$CONAN_CACHE" ]; then
            # Include ALL .a files from Conan cache
            # Filter by architecture to avoid mixing x86_64 and ARM64 objects
            echo "   Detecting build architecture..."
            ARCH=$(uname -m)
            echo "   Architecture: $ARCH"
            
            CONAN_LIBS=$(find "$CONAN_CACHE" -name "*.a" 2>/dev/null || true)
            
            CONAN_COUNT=$(echo "$CONAN_LIBS" | grep -c "\.a$" || echo 0)
            echo "   Found $CONAN_COUNT total libraries in Conan cache"
            
            PROCESSED=0
            SKIPPED=0
            
            for lib in $CONAN_LIBS; do
              libname=$(basename "$lib" .a | sed 's/^lib//')
              
              # Check if library matches our architecture
              LIB_ARCH=$(lipo -info "$lib" 2>/dev/null | grep -o "arm64\|x86_64" | head -1 || file "$lib" | grep -o "arm64\|x86_64" | head -1 || echo "unknown")
              
              if [ "$LIB_ARCH" = "$ARCH" ] || [ "$LIB_ARCH" = "unknown" ]; then
                echo "   Extracting $libname ($LIB_ARCH)..."
                mkdir -p "$EXTRACT_DIR/conan_$libname"
                cd "$EXTRACT_DIR/conan_$libname"
                if ar t "$lib" >/dev/null 2>&1; then
                  ar x "$lib" 2>/dev/null || echo "   Warning: Partial extraction for $libname"
                  OBJ_COUNT=$(find . -name "*.o" | wc -l)
                  if [ $OBJ_COUNT -gt 0 ]; then
                    echo "   -> $OBJ_COUNT object files"
                    PROCESSED=$((PROCESSED + 1))
                  fi
                fi
              else
                SKIPPED=$((SKIPPED + 1))
              fi
            done
            
            echo "   Processed: $PROCESSED libraries"
            echo "   Skipped: $SKIPPED libraries (wrong architecture)"
          else
            echo "   Conan cache not found at $CONAN_CACHE"
          fi
          
          # Create combined static library
          echo ""
          echo "=== Creating bundled static library ==="
          cd "$EXTRACT_DIR"
          
          # Find all object files (only .o files, no archives)
          OBJ_FILES=$(find . -type f -name "*.o")
          
          if [ -z "$OBJ_FILES" ]; then
            echo "ERROR: No object files found!"
            echo "Contents of EXTRACT_DIR:"
            ls -la
            exit 1
          fi
          
          TOTAL_COUNT=$(echo $OBJ_FILES | wc -w)
          echo "Total object files found: $TOTAL_COUNT"
          
          if [ $TOTAL_COUNT -lt 500 ]; then
            echo ""
            echo "WARNING: Only $TOTAL_COUNT object files found (expected 1000+)"
            echo "Conan dependencies may be missing!"
          fi
          
          # Create the combined archive
          ar rcs "$BUILD_DIR/dobby_bridge/libdobby_bridge.a" $OBJ_FILES
          
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          
          echo ""
          echo "=== Bundled library created successfully ==="
          ls -lh "$BUILD_DIR/dobby_bridge/libdobby_bridge.a"

      - name: Verify Bundled Static Library
        working-directory: TrustTunnelClient/build/dobby_bridge
        run: |
          ls -lh libdobby_bridge.a
          file libdobby_bridge.a
          echo "Object file count: $(ar t libdobby_bridge.a | wc -l)"

      - name: Upload macOS Static Library
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-macos-static
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.a

