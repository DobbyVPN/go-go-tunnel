name: Build Dobby Bridge (Mobile)

env:
  CONAN_VER: 2.12

on:
  workflow_dispatch:
  push:
    paths:
      - 'dobby_bridge/**'

jobs:
  Android-ARM64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Rust Toolchains for Android
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk
      - name: Install Dependencies
        run: |
          sudo apt install -y ninja-build
          pip install conan~=$CONAN_VER

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          # Add dobby_bridge subdirectory to CMakeLists.txt
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Bridge (Android)
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          
          # Compile using the Android NDK Toolchain
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -G "Ninja" ..
            
          cmake --build . --target dobby_bridge

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-android-arm64
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.so

# -------------------------------------------------------------

  iOS-ARM64:
    runs-on: macos-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          brew install ninja
          pip install conan~=$CONAN_VER

      - name: Install Rust Toolchains for iOS
        run: |
          rustup target add aarch64-apple-ios

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          # Add dobby_bridge subdirectory to CMakeLists.txt
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Bridge (iOS)
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          
          # Compile using the Apple iOS Toolchain
          cmake -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -G "Ninja" ..
            
          cmake --build . --target dobby_bridge

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-ios-arm64
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.a
