name: Build Linux

on:
  push:
    branches: ["*"]
  pull_request:
  workflow_dispatch:

env:
  CONAN_VER: 2.12
  LLVM_MAJOR_VER: 21
  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

          pip install -r TrustTunnelClient/requirements.txt
          pip install conan~=$CONAN_VER

          # Install LLVM/Clang
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_MAJOR_VER
          rm ./llvm.sh
          sudo apt-get install -y libc++-${LLVM_MAJOR_VER}-dev libclang-rt-${LLVM_MAJOR_VER}-dev
          echo "/usr/lib/llvm-$LLVM_MAJOR_VER/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-ccache

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: linux-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}
          restore-keys: linux-conan2-

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        working-directory: TrustTunnelClient
        run: ./scripts/bootstrap_conan_deps.py

      - name: Prepare dobby_bridge build
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> TrustTunnelClient/CMakeLists.txt

      - name: CMake configure
        working-directory: TrustTunnelClient
        run: |
          mkdir -p $BUILD_DIR && cd $BUILD_DIR && \
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIPV6_UNAVAILABLE=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -GNinja \
            ..

      - name: Save conan cache
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: linux-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}

      - name: Build dobby_bridge
        working-directory: TrustTunnelClient
        run: cmake --build $BUILD_DIR --target dobby_bridge

      - name: Prepare library directory
        run: |
          mkdir -p lib/linux
          cp TrustTunnelClient/$BUILD_DIR/dobby_bridge/libdobby_bridge.so lib/linux/
          echo "=== Library info ==="
          file lib/linux/libdobby_bridge.so
          ls -lh lib/linux/libdobby_bridge.so
          echo "=== Exported symbols ==="
          nm -D lib/linux/libdobby_bridge.so | grep -i "dobby" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdobby_bridge-linux-x86_64
          path: lib/linux/libdobby_bridge.so

      - name: Build Go example
        working-directory: examples
        run: go build -v -o examples

      - name: Run example (crash test)
        working-directory: examples
        run: |
          export LD_LIBRARY_PATH=$PWD/../lib/linux:$LD_LIBRARY_PATH
          # Run for 5 seconds — if it doesn't crash, the test passes.
          # timeout returns 124 on timeout (expected), segfault returns 139.
          timeout 5 ./examples || EC=$?
          EC=${EC:-0}
          if [ "$EC" -eq 0 ] || [ "$EC" -eq 124 ]; then
            echo "✅ Test passed (exit code $EC)"
          else
            echo "❌ CRASH detected with exit code $EC"
            exit 1
          fi
