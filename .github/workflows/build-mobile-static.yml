name: Build Mobile Static Libraries

env:
  CONAN_VER: 2.12

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'dobby_bridge/**'
      - 'TrustTunnelClient/**'
      - '.github/workflows/build-mobile-static.yml'
  release:
    types: [created]

jobs:
  build-ios-static:
    name: Build iOS Static Library
    runs-on: macos-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          brew install ninja
          pip install conan~=$CONAN_VER

      - name: Bootstrap Conan
        working-directory: .
        run: python ./scripts/bootstrap_conan_deps_wrapper.py https://github.com/AdguardTeam/NativeLibsCommon.git https://github.com/AdguardTeam/DnsLibs.git b9944bd50d1d94e3462d951871c1d011dd42c168

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build iOS Static Library
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          
          # Configure for iOS arm64
          cmake -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_STATIC_LIBS=ON \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -G "Ninja" ..
          
          # Build
          cmake --build . --target dobby_bridge

      - name: Verify iOS Static Library
        working-directory: TrustTunnelClient/build/dobby_bridge
        run: |
          echo "=== iOS Static Library ==="
          ls -lh libdobby_bridge.a
          file libdobby_bridge.a
          echo ""
          echo "=== Library Size ==="
          du -h libdobby_bridge.a
          echo ""
          echo "=== Symbols (first 20) ==="
          nm libdobby_bridge.a | head -20

      - name: Upload iOS Static Library
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-ios-static
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.a
          retention-days: 30

  build-android-static:
    name: Build Android Static Library (${{ matrix.abi }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            api: 21
            display: "ARM64 (64-bit ARM - Modern Devices)"
          - abi: armeabi-v7a
            api: 21
            display: "ARM32 (32-bit ARM - Legacy Devices)"
          - abi: x86_64
            api: 21
            display: "x86_64 (64-bit x86 - Emulators)"
          - abi: x86
            api: 21
            display: "x86 (32-bit x86 - Old Emulators)"
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan~=$CONAN_VER

      - name: Bootstrap Conan
        working-directory: .
        run: python ./scripts/bootstrap_conan_deps_wrapper.py https://github.com/AdguardTeam/NativeLibsCommon.git https://github.com/AdguardTeam/DnsLibs.git b9944bd50d1d94e3462d951871c1d011dd42c168

      - name: Inject dobby_bridge into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Android Static Library - ${{ matrix.display }}
        working-directory: TrustTunnelClient
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        shell: bash
        run: |
          mkdir build && cd build
          
          echo "Building for Android ${{ matrix.abi }} (API ${{ matrix.api }})"
          echo "NDK Path: $ANDROID_NDK_HOME"
          
          # Configure for Android
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.api }} \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_STATIC_LIBS=ON \
            -G "Ninja" ..
          
          # Build
          cmake --build . --target dobby_bridge

      - name: Verify Android Static Library - ${{ matrix.abi }}
        working-directory: TrustTunnelClient/build/dobby_bridge
        run: |
          echo "=== Android Static Library (${{ matrix.abi }}) ==="
          ls -lh libdobby_bridge.a
          file libdobby_bridge.a
          echo ""
          echo "=== Library Size ==="
          du -h libdobby_bridge.a
          echo ""
          echo "=== Symbols (first 20) ==="
          nm libdobby_bridge.a | head -20 || echo "nm not available for cross-compiled library"

      - name: Upload Android Static Library - ${{ matrix.abi }}
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-android-${{ matrix.abi }}-static
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.a
          retention-days: 30

  commit-mobile-libraries:
    name: Commit Mobile Static Libraries
    needs: [build-ios-static, build-android-static]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download iOS Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-ios-static
          path: lib/ios

      - name: Download Android ARM64 Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-android-arm64-v8a-static
          path: lib/android/arm64-v8a

      - name: Download Android ARM32 Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-android-armeabi-v7a-static
          path: lib/android/armeabi-v7a

      - name: Download Android x86_64 Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-android-x86_64-static
          path: lib/android/x86_64

      - name: Download Android x86 Static Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-android-x86-static
          path: lib/android/x86

      - name: Verify All Mobile Libraries
        run: |
          echo "=========================================="
          echo "Mobile Static Libraries Verification"
          echo "=========================================="
          echo ""
          
          echo "=== iOS ==="
          ls -lh lib/ios/
          file lib/ios/libdobby_bridge.a
          SIZE_IOS=$(du -h lib/ios/libdobby_bridge.a | cut -f1)
          echo "Size: $SIZE_IOS"
          echo ""
          
          echo "=== Android ARM64 (Primary) ==="
          ls -lh lib/android/arm64-v8a/
          file lib/android/arm64-v8a/libdobby_bridge.a
          SIZE_ARM64=$(du -h lib/android/arm64-v8a/libdobby_bridge.a | cut -f1)
          echo "Size: $SIZE_ARM64"
          echo ""
          
          echo "=== Android ARM32 (Legacy) ==="
          ls -lh lib/android/armeabi-v7a/
          file lib/android/armeabi-v7a/libdobby_bridge.a
          SIZE_ARM32=$(du -h lib/android/armeabi-v7a/libdobby_bridge.a | cut -f1)
          echo "Size: $SIZE_ARM32"
          echo ""
          
          echo "=== Android x86_64 (Emulators) ==="
          ls -lh lib/android/x86_64/
          file lib/android/x86_64/libdobby_bridge.a
          SIZE_X86_64=$(du -h lib/android/x86_64/libdobby_bridge.a | cut -f1)
          echo "Size: $SIZE_X86_64"
          echo ""
          
          echo "=== Android x86 (Old Emulators) ==="
          ls -lh lib/android/x86/
          file lib/android/x86/libdobby_bridge.a
          SIZE_X86=$(du -h lib/android/x86/libdobby_bridge.a | cut -f1)
          echo "Size: $SIZE_X86"
          echo ""
          
          echo "=========================================="
          echo "Summary"
          echo "=========================================="
          echo "iOS (arm64):              $SIZE_IOS"
          echo "Android (arm64-v8a):      $SIZE_ARM64"
          echo "Android (armeabi-v7a):    $SIZE_ARM32"
          echo "Android (x86_64):         $SIZE_X86_64"
          echo "Android (x86):            $SIZE_X86"
          echo "=========================================="
          
          # Calculate total size
          TOTAL_SIZE=$(du -sh lib/ | cut -f1)
          echo "Total mobile libraries:   $TOTAL_SIZE"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Commit and Push Mobile Static Libraries
        run: |
          # Add all mobile libraries
          git add lib/ios/libdobby_bridge.a
          git add lib/android/arm64-v8a/libdobby_bridge.a
          git add lib/android/armeabi-v7a/libdobby_bridge.a
          git add lib/android/x86_64/libdobby_bridge.a
          git add lib/android/x86/libdobby_bridge.a
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to mobile libraries"
          else
            echo "📦 Committing updated mobile static libraries..."
            git commit -m "chore: update mobile static libraries (iOS + Android) [skip ci]"
            
            # Push with retry logic
            for i in {1..3}; do
              if git push; then
                echo "✅ Successfully pushed mobile libraries"
                break
              else
                echo "⚠️ Push failed, attempt $i/3"
                if [ $i -lt 3 ]; then
                  echo "Pulling latest changes..."
                  git pull --rebase
                  sleep 2
                fi
              fi
            done
          fi

      - name: Create Summary
        run: |
          echo "## 📱 Mobile Static Libraries Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### iOS" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ arm64: \`lib/ios/libdobby_bridge.a\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ arm64-v8a (64-bit ARM): \`lib/android/arm64-v8a/libdobby_bridge.a\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ armeabi-v7a (32-bit ARM): \`lib/android/armeabi-v7a/libdobby_bridge.a\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ x86_64 (64-bit x86): \`lib/android/x86_64/libdobby_bridge.a\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ x86 (32-bit x86): \`lib/android/x86/libdobby_bridge.a\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# iOS" >> $GITHUB_STEP_SUMMARY
          echo "gomobile bind -target=ios -o TrustTunnel.xcframework ." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Android" >> $GITHUB_STEP_SUMMARY
          echo "gomobile bind -target=android -o trusttunnel.aar ." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test-mobile-libraries:
    name: Test Mobile Libraries
    needs: [build-ios-static, build-android-static]
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download iOS Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-ios-static
          path: lib/ios

      - name: Download Android ARM64 Library
        uses: actions/download-artifact@v4
        with:
          name: dobby_bridge-android-arm64-v8a-static
          path: lib/android/arm64-v8a

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Test iOS Build
        run: |
          echo "Testing iOS framework build..."
          gomobile bind -target=ios -o TrustTunnel.xcframework ./manager || {
            echo "⚠️ iOS build test failed (may need Xcode setup)"
            exit 0  # Don't fail the workflow
          }
          
          if [ -d "TrustTunnel.xcframework" ]; then
            echo "✅ iOS framework created successfully"
            ls -lR TrustTunnel.xcframework
          fi

      - name: Test Android Build
        run: |
          echo "Testing Android AAR build..."
          gomobile bind -target=android -o trusttunnel.aar ./manager || {
            echo "⚠️ Android build test failed (may need Android SDK setup)"
            exit 0  # Don't fail the workflow
          }
          
          if [ -f "trusttunnel.aar" ]; then
            echo "✅ Android AAR created successfully"
            ls -lh trusttunnel.aar
            unzip -l trusttunnel.aar
          fi
