name: Build Dobby Bridge (Desktop)

env:
  CONAN_VER: 2.12

on:
  workflow_dispatch:
  push:
    paths:
      - 'dobby_bridge/**'

jobs:
  Linux:
    runs-on: ubuntu-22.04
    env:
      LLVM_MAJOR_VER: 21
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetches the TrustTunnel vendor code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install LLVM and Dependencies
        run: |
          sudo apt install -y ninja-build
          pip install conan~=$CONAN_VER
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_MAJOR_VER
          sudo apt install -y libc++-${LLVM_MAJOR_VER}-dev libclang-rt-${LLVM_MAJOR_VER}-dev libc++abi-${LLVM_MAJOR_VER}-dev
          echo "/usr/lib/llvm-$LLVM_MAJOR_VER/bin" >> $GITHUB_PATH

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge and Visibility into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          # Hide all C++ symbols globally so they don't leak into the shared library
          sed -i 's/project(vpn_libs C CXX)/project(vpn_libs C CXX)\n\nset(CMAKE_CXX_VISIBILITY_PRESET hidden)\nset(CMAKE_C_VISIBILITY_PRESET hidden)\nset(CMAKE_VISIBILITY_INLINES_HIDDEN ON)/' CMakeLists.txt
          # Add dobby_bridge subdirectory to CMakeLists.txt
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Bridge
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_STATIC_LIBS=OFF \
            -G "Ninja" ..
          cmake --build . --target dobby_bridge

      - name: Verify Library
        run: |
          echo "=== Library Size ==="
          ls -lh TrustTunnelClient/build/dobby_bridge/libdobby_bridge.so
          echo "=== Exported DOBBY symbols ==="
          nm -D TrustTunnelClient/build/dobby_bridge/libdobby_bridge.so | grep -i dobby || true
          echo "=== Total exported symbols ==="
          nm -D TrustTunnelClient/build/dobby_bridge/libdobby_bridge.so | wc -l

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-linux
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.so

# -------------------------------------------------------------

  MacOS:
    runs-on: macos-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install LLVM and Dependencies
        run: |
          brew install ninja llvm@21
          sed -i '' 's/_LIBCPP_INTRODUCED_IN_LLVM_21 1/_LIBCPP_INTRODUCED_IN_LLVM_21 0/g' "$(brew --prefix llvm@21)/include/c++/v1/__configuration/availability.h"
          pip install conan~=$CONAN_VER
          echo "/opt/homebrew/opt/llvm@21/bin" >> $GITHUB_PATH

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i '' 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge and Visibility into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          # Hide all C++ symbols globally so they don't leak into the shared library
          sed -i '' 's/project(vpn_libs C CXX)/project(vpn_libs C CXX)\'$'\n\'$'\nset(CMAKE_CXX_VISIBILITY_PRESET hidden)\'$'\nset(CMAKE_C_VISIBILITY_PRESET hidden)\'$'\nset(CMAKE_VISIBILITY_INLINES_HIDDEN ON)/' CMakeLists.txt
          # Add dobby_bridge subdirectory to CMakeLists.txt
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> CMakeLists.txt

      - name: Configure and Build Bridge
        working-directory: TrustTunnelClient
        shell: bash
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_STATIC_LIBS=OFF \
            -G "Ninja" ..
          cmake --build . --target dobby_bridge

      - name: Verify Library
        run: |
          echo "=== Library Size ==="
          ls -lh TrustTunnelClient/build/dobby_bridge/libdobby_bridge.dylib
          echo "=== Exported DOBBY symbols ==="
          nm -gU TrustTunnelClient/build/dobby_bridge/libdobby_bridge.dylib | grep -i dobby || true
          echo "=== Total exported symbols ==="
          nm -gU TrustTunnelClient/build/dobby_bridge/libdobby_bridge.dylib | wc -l

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-macos
          path: TrustTunnelClient/build/dobby_bridge/libdobby_bridge.dylib

# -------------------------------------------------------------

  Windows:
    runs-on: windows-latest
    env:
      MSVC_VER: 17
      MSVC_YEAR: 2022
    if: "!startsWith(github.event.head_commit.message, 'skipci:')"
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dependencies
        run: |
          choco install strawberryperl nasm
          pip install conan~=${{ env.CONAN_VER }} ninja

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          (Get-Content conanfile.py) -replace 'dns-libs/2.8.51@', 'dns-libs/2.8.52@' | Set-Content conanfile.py
          Write-Host "Patched conanfile.py to use dns-libs 2.8.52"
          Select-String -Path conanfile.py -Pattern "dns-libs"

      - name: Bootstrap Conan
        working-directory: TrustTunnelClient
        run: python ./scripts/bootstrap_conan_deps.py

      - name: Inject dobby_bridge and Visibility into TrustTunnelClient CMakeLists.txt
        working-directory: TrustTunnelClient
        run: |
          # Hide all C++ symbols globally
          (Get-Content CMakeLists.txt) -replace 'project\(vpn_libs C CXX\)', "project(vpn_libs C CXX)`n`nset(CMAKE_CXX_VISIBILITY_PRESET hidden)`nset(CMAKE_C_VISIBILITY_PRESET hidden)`nset(CMAKE_VISIBILITY_INLINES_HIDDEN ON)" | Set-Content CMakeLists.txt
          # Add dobby_bridge subdirectory to CMakeLists.txt
          Add-Content -Path CMakeLists.txt -Value 'add_subdirectory("../dobby_bridge" "dobby_bridge")'

      - name: Configure and Build Bridge
        working-directory: TrustTunnelClient
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_C_COMPILER="cl.exe" `
            -DCMAKE_CXX_COMPILER="cl.exe" `
            -DBUILD_STATIC_LIBS=OFF `
            -G "Ninja" ..
          cmake --build . --target dobby_bridge

      - name: Verify Library
        run: |
          Write-Host "=== Library Size ==="
          Get-ChildItem TrustTunnelClient\build\dobby_bridge\dobby_bridge.dll | Select-Object Name, Length
          Write-Host "=== Exported symbols ==="
          dumpbin /exports TrustTunnelClient\build\dobby_bridge\dobby_bridge.dll | Select-String "dobby"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dobby_bridge-windows
          path: |
            TrustTunnelClient\build\dobby_bridge\*.dll
            TrustTunnelClient\build\dobby_bridge\*.lib
