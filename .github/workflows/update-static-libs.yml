name: Update Static Libraries

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to fetch artifacts from'
        required: true
        default: 'main'

jobs:
  update-libs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Function to fetch latest successful run ID for a workflow
          get_latest_run() {
            local workflow=$1
            local branch="${{ github.event.inputs.branch || 'main' }}"
            gh run list --workflow="$workflow" --branch="$branch" --status=success --limit=1 --json databaseId --jq '.[0].databaseId'
          }
          
          echo "=== Fetching Android Static Libraries ==="
          mkdir -p lib/android/arm64-v8a
          ANDROID_RUN=$(get_latest_run "build-android.yml")
          if [ -n "$ANDROID_RUN" ]; then
            echo "Downloading Android artifacts from run $ANDROID_RUN"
            rm -f lib/android/arm64-v8a/libdobby_bridge.a
            gh run download "$ANDROID_RUN" -n libdobby_bridge-android-arm64-v8a-static -D lib/android/arm64-v8a || echo "Failed to download Android artifact"
          else
            echo "No successful Android runs found."
          fi
          
          echo "=== Fetching iOS Static Libraries ==="
          mkdir -p lib/ios
          IOS_RUN=$(get_latest_run "build-ios.yml")
          if [ -n "$IOS_RUN" ]; then
            echo "Downloading iOS artifacts from run $IOS_RUN"
            rm -f lib/ios/libdobby_bridge.a
            gh run download "$IOS_RUN" -n libdobby_bridge-ios-arm64 -D lib/ios || echo "Failed to download iOS artifact"
          else
            echo "No successful iOS runs found."
          fi
          
          echo "=== Fetching MacOS Static Libraries ==="
          mkdir -p lib/macos
          MACOS_RUN=$(get_latest_run "build-macos.yml")
          if [ -n "$MACOS_RUN" ]; then
            echo "Downloading MacOS artifacts from run $MACOS_RUN"
            rm -f lib/macos/libdobby_bridge.a
            gh run download "$MACOS_RUN" -n libdobby_bridge-macos-arm64-static -D lib/macos || echo "Failed to download MacOS artifact"
          else
            echo "No successful MacOS runs found."
          fi
          
          echo "=== Fetching Windows Libraries ==="
          mkdir -p lib/windows
          WINDOWS_RUN=$(get_latest_run "build-windows.yml")
          if [ -n "$WINDOWS_RUN" ]; then
            echo "Downloading Windows artifacts from run $WINDOWS_RUN"
            rm -f lib/windows/dobby_bridge.lib lib/windows/dobby_bridge.dll
            gh run download "$WINDOWS_RUN" -n dobby_bridge-windows-x86_64 -D lib/windows || echo "Failed to download Windows artifact"
            # We only want to commit the .lib file
            rm -f lib/windows/dobby_bridge.dll
          else
            echo "No successful Windows runs found."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add lib/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: update static libraries from platform workflows"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected in static libraries"
          fi
