name: Build iOS

on:
  push:
    branches: ["*"]
  pull_request:
  workflow_dispatch:

env:
  CONAN_VER: 2.12
  BUILD_DIR: build

jobs:
  ios-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packages
        run: |
          brew install ninja llvm@21

          # Patch libc++ availability header (required for compatibility)
          sed -i '' 's/_LIBCPP_INTRODUCED_IN_LLVM_21 1/_LIBCPP_INTRODUCED_IN_LLVM_21 0/g' \
            "$(brew --prefix llvm@21)/include/c++/v1/__configuration/availability.h"

          pip install -r TrustTunnelClient/requirements.txt
          pip install conan~=$CONAN_VER

          echo "/opt/homebrew/opt/llvm@21/bin" >> $GITHUB_PATH
          PY_BIN=$(python3 -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "$PY_BIN" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: aarch64-apple-ios

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ios-ccache

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: ios-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}
          restore-keys: ios-conan2-

      - name: Patch dns-libs version in conanfile.py
        working-directory: TrustTunnelClient
        run: |
          # Update dns-libs version from 2.8.51 to 2.8.52 (upstream TrustTunnel hasn't updated yet)
          sed -i '' 's/dns-libs\/2.8.51@/dns-libs\/2.8.52@/' conanfile.py
          echo "Patched conanfile.py to use dns-libs 2.8.52"
          grep "dns-libs" conanfile.py

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        working-directory: TrustTunnelClient
        run: ./scripts/bootstrap_conan_deps.py

      - name: Prepare dobby_bridge build
        run: |
          echo 'add_subdirectory("../dobby_bridge" "dobby_bridge")' >> TrustTunnelClient/CMakeLists.txt

      - name: CMake configure (iOS cross-compile)
        working-directory: TrustTunnelClient
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p $BUILD_DIR && cd $BUILD_DIR && \
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_OSX_SYSROOT=$IOS_SDK \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIPV6_UNAVAILABLE=ON \
            -DDOBBY_BRIDGE_STATIC=ON \
            -GNinja \
            ..

      - name: Save conan cache
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: ios-conan2-${{ hashFiles('TrustTunnelClient/conanfile.py') }}

      - name: Build dobby_bridge
        working-directory: TrustTunnelClient
        run: cmake --build $BUILD_DIR --target dobby_bridge

      - name: Create merged static library
        run: |
          mkdir -p lib/ios

          # Merge all static libraries into one fat archive so the consumer
          # only needs to link a single .a file.
          STATIC_LIBS=$(find TrustTunnelClient/$BUILD_DIR -name "*.a" \
            -not -path "*/CMakeFiles/*" \
            -not -name "*.dll.a" \
            | sort)

          echo "=== Static libraries found ==="
          echo "$STATIC_LIBS"

          libtool -static -o lib/ios/libdobby_bridge.a $STATIC_LIBS

          echo "=== Merged library info ==="
          file lib/ios/libdobby_bridge.a
          ls -lh lib/ios/libdobby_bridge.a
          echo "=== Exported symbols ==="
          nm -gU lib/ios/libdobby_bridge.a 2>/dev/null | grep -i "dobby" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdobby_bridge-ios-arm64
          path: lib/ios/libdobby_bridge.a

      - name: Build Go example (verify linking)
        working-directory: examples
        run: |
          # Build the Go example for iOS arm64 using the iOS SDK toolchain.
          # We don't run it (requires simulator or device), but we verify it links perfectly.
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            CC="$(xcrun --sdk iphoneos --find clang) -isysroot $(xcrun --sdk iphoneos --show-sdk-path)" \
            CXX="$(xcrun --sdk iphoneos --find clang++) -isysroot $(xcrun --sdk iphoneos --show-sdk-path)" \
            go build -v -tags static -o examples_ios
